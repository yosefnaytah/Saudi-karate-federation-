<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Saudi Karate Federation</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #f8f8f8;
            color: #333;
        }
        
        /* Header Styles with Animation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, #7ed09d, #2e8b57);
            z-index: -1;
            opacity: 0.9;
            transition: background 0.5s ease;
        }
        
        /* Mouse movement animation effect */
        .header:hover::before {
            background: linear-gradient(120deg, #2e8b57, #7ed09d);
        }
        
        /* Navigation menu */
        .nav-menu {
            display: flex;
            gap: 30px;
        }
        
        .nav-item {
            position: relative;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            padding: 5px 0;
            transition: color 0.3s ease;
        }
        
        /* Underline animation for nav items */
        .nav-item::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: white;
            transition: width 0.3s ease;
        }
        
        .nav-item:hover::after {
            width: 100%;
        }
        
        /* Login button styling */
        .login-btn {
            background-color: #3a7d44;
            color: white;
            padding: 8px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            background-color: #2c6033;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        /* Vision 2030 styling */
        .vision-logo {
            text-align: center;
        }
        
        .vision-title {
            color: white;
            font-size: 12px;
            margin: 0;
        }
        
        .vision-year {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }
        
        /* Main Content Styles */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* Page title with animation */
        .page-title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 50px;
            color: #2e8b57;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 0;
            height: 3px;
            background-color: #2e8b57;
            animation: expandWidth 2s forwards;
        }
        
        @keyframes expandWidth {
            to { width: 100%; }
        }
        
        /* Contact sections layout */
        .contact-content.centered {
    display: flex;
    justify-content: center;
    margin-bottom: 50px;
}

.contact-info {
    width: 500px;
    max-width: 100%;
    background-color: white;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
        
        .contact-info:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .info-title {
            font-size: 24px;
            margin-bottom: 30px;
            color: #2e8b57;
            text-align: center;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .info-icon {
            width: 50px;
            height: 50px;
            background-color: #2e8b57;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
            color: white;
            font-size: 22px;
        }
        
        .info-icon.email::before {
            content: '✉';
        }
        
        .info-icon.phone::before {
            content: '☏';
        }
        
        .info-icon.location::before {
            content: '⚑';
        }
        
        .info-text {
            flex: 1;
        }
        
        .info-label {
            color: #777;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Team information */
        .team-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .team-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #2e8b57;
        }
        
        .team-member {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        /* Contact Form Card */
        .contact-form {
            flex: 1;
            min-width: 300px;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .contact-form:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .form-title {
            font-size: 24px;
            margin-bottom: 30px;
            color: #2e8b57;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #2e8b57;
            box-shadow: 0 0 8px rgba(46, 139, 87, 0.3);
            outline: none;
        }
        
        .form-textarea {
            height: 150px;
            resize: vertical;
        }
        
        .submit-btn {
            background-color: #2e8b57;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
        }
        
        .submit-btn:hover {
            background-color: #1f6b3b;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* Map section */
        .map-section {
            margin-top: 50px;
        }
        
        .map-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2e8b57;
            text-align: center;
        }
        
        .map-container {
            position: relative;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .map-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .visit-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2e8b57;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .visit-btn:hover {
            background-color: #1f6b3b;
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        /* Footer Styles */
        .footer {
            margin-top: 80px;
            background-color: #333;
            color: white;
            padding: 40px 0 20px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            padding: 0 20px;
        }
        
        .footer-section {
            flex: 1;
            min-width: 250px;
        }
        
        .footer-title {
            font-size: 18px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .footer-title::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: -8px;
            width: 50px;
            height: 2px;
            background-color: #2e8b57;
        }
        
        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .social-icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: #555;
            border-radius: 50%;
            color: white;
            text-align: center;
            line-height: 40px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .social-icon:hover {
            background-color: #2e8b57;
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        .copyright {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 20px;
            margin-top: 40px;
            border-top: 1px solid #444;
            color: #aaa;
            font-size: 14px;
            padding-right: 20px;
            padding-left: 20px;
        }
        
        /* Responsive styles */
        @media (max-width: 768px) {
            .contact-content {
                flex-direction: column;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .contact-info, .contact-form {
                min-width: 100%;
            }
        }
