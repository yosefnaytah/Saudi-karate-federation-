<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose registration — Saudi Karate Federation</title>
    <link rel="stylesheet" href="SKF.CSS">
    <style>
        html { height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            box-sizing: border-box;
        }
        .hub {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255,255,255,0.94);
            padding: 28px 22px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .hub h1 { margin: 0 0 8px; font-size: 1.5rem; color: #1b5e20; text-align: center; }
        .hub p.lead { margin: 0 0 22px; text-align: center; color: #444; font-size: 15px; line-height: 1.5; }
        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            align-items: stretch;
        }
        @media (min-width: 640px) {
            .choices { grid-template-columns: 1fr 1fr 1fr; }
        }
        .choice {
            display: block;
            padding: 22px 16px;
            border-radius: 12px;
            text-decoration: none !important;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            line-height: 1.4;
            color: #fff !important;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.2s ease;
        }
        .choice:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.22);
            filter: brightness(1.03);
        }
        .choice:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }
        .choice-members { background: #2e7d32; }
        .choice-members:hover { background: #1b5e20; color: #fff !important; }
        .choice-staff {
            background: #1565c0;
            border: 3px solid #0d47a1;
        }
        .choice-staff:hover { background: #0d47a1; color: #fff !important; }
        .hub-footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 26px;
        }
        .hub-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none !important;
            box-shadow: 0 3px 12px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.22s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .hub-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
        }
        .hub-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .hub-btn-home {
            background: #fff;
            color: #1b5e20 !important;
            border: 2px solid #2e7d32;
        }
        .hub-btn-home:hover { background: #e8f5e9; border-color: #1b5e20; }
        .hub-btn-login {
            background: #fff;
            color: #1565c0 !important;
            border: 2px solid #1565c0;
        }
        .hub-btn-login:hover { background: #e3f2fd; border-color: #0d47a1; }
    </style>
</head>
<body>
    <div class="hub">
        <h1>Registration</h1>
        <p class="lead"><strong>Choose your role</strong> — <strong>Players, coaches, and club administrators</strong>, <strong>Referee &amp; Referees+</strong>, and <strong>SKF Administrator</strong>.</p>
        <div class="choices">
            <a class="choice choice-members" href="REGISTER.html">Players, coaches, club administrators</a>
            <a class="choice choice-staff" href="skf-staff-register.html?role=referees_plus">Referee &amp; Referees+</a>
            <a class="choice choice-staff" href="skf-staff-register.html?role=skf_admin">SKF Administrator</a>
        </div>
        <div class="hub-footer-actions">
            <a class="hub-btn hub-btn-home" href="land.html">Go to federation home</a>
            <a class="hub-btn hub-btn-login" href="index.html">Sign in with your account</a>
        </div>
    </div>
</body>
</html>
