<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Saudi Karate Federation</title>
    <link rel="stylesheet" href="SKF.CSS"> <!-- Link to CSS file -->
</head>
<body class="forgot-password-page">

    <!-- Language Switcher -->
    <div class="language-switch" onclick="toggleLanguageMenu()">🌍</div>
    <div class="language-menu" id="languageMenu">
        <div onclick="changeLanguage('en')">English</div>
        <div onclick="changeLanguage('ar')">العربية</div>
    </div>

    <!-- Forgot Password Form -->
    <div class="forgot-password-container">
        <h2>Recover Your Password</h2>
        <p>Enter your email or phone number to receive a password reset link.</p>

        <form action="reset-password.php" method="POST" onsubmit="return validateInput()">
            <label for="contact">Email or Phone Number:</label>
            <input type="text" id="contact" name="contact" placeholder="Enter Email or Phone Number" required>
            <button type="submit" class="reset-btn">Send Reset Link</button>
        </form>

        <a href="SKF.HTML" class="back-to-login">Back to Login</a>
    </div>

    <script>
        // Function to validate email or phone number
        function validateInput() {
            var contact = document.getElementById("contact").value;
            var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            var phonePattern = /^(05)[0-9]{8}$/; // Matches Saudi phone numbers (05xxxxxxxx)

            if (!emailPattern.test(contact) && !phonePattern.test(contact)) {
                alert("Please enter a valid email or phone number.");
                return false;
            }
            return true;
        }

        // Language Switcher
        function toggleLanguageMenu() {
            var menu = document.getElementById("languageMenu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }

        function changeLanguage(lang) {
            alert("Language switched to " + (lang === "en" ? "English" : "العربية"));
        }
    </script>

</body>
</html>
