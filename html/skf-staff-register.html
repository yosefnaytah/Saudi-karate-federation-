<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER: SKF staff — Saudi Karate Federation</title>
    <link rel="stylesheet" href="SKF.CSS">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js?v=20260411d" defer></script>
    <style>
        body.staff-register-page {
            background-color: #1a237e;
            background-image: url('SKF-REGISTER.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            height: auto;
            margin: 0;
            padding: 24px 16px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .reg-wrap {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            max-height: calc(100dvh - 48px);
            overflow-y: auto;
        }
        .reg-wrap input, .reg-wrap select, .reg-wrap textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .reg-wrap label { font-size: 13px; color: #444; display: block; margin-top: 10px; }
        .reg-wrap select.role-select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn:hover { background: #1b5e20; }
        #regErr {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        #regOk {
            display: none;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .reg-wrap a.btn-skf-staff-register { margin-top: 0; margin-bottom: 16px; }
    </style>
</head>
<body class="staff-register-page">
    <div class="reg-wrap">
        <h1 style="margin-top:0;font-size:1.5rem;color:#1b5e20;">Create account</h1>
        <a href="registration.html" class="btn-skf-staff-register">Choose your registration path</a>
        <div id="regErr"></div>
        <div id="regOk"></div>
        <form id="staffRegForm">
            <label for="a_fname">First name *</label>
            <input type="text" id="a_fname" required autocomplete="given-name" placeholder="First name">

            <label for="a_lname">Last name *</label>
            <input type="text" id="a_lname" required autocomplete="family-name" placeholder="Last name">

            <label for="a_email">Email *</label>
            <input type="email" id="a_email" required autocomplete="email" placeholder="your@email.com">

            <div id="refereeRoleWrap" style="display:none;">
                <label for="staff_ref_role_select">Role *</label>
                <select id="staff_ref_role_select" name="staff_ref_role_select" class="role-select" aria-required="true">
                    <option value="" disabled selected>Select your role</option>
                    <option value="referee">Referee</option>
                    <option value="referees_plus">Referee+</option>
                </select>
            </div>

            <label for="a_pass">Password *</label>
            <input type="password" id="a_pass" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters">

            <label for="a_pass2">Confirm password *</label>
            <input type="password" id="a_pass2" required autocomplete="new-password" minlength="8" placeholder="Same password again">

            <label for="a_phone">Phone</label>
            <input type="tel" id="a_phone" autocomplete="tel" placeholder="05xxxxxxxx">

            <input type="hidden" id="a_role" name="a_role" value="">

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search || '');
            var roleFromUrl = (params.get('role') || '').trim().toLowerCase();
            var roleEl = document.getElementById('a_role');
            var refereeRoleWrap = document.getElementById('refereeRoleWrap');
            var staffRefRoleSelect = document.getElementById('staff_ref_role_select');
            var staffRegMode = '';

            function syncStaffRefRoleRequired() {
                if (!staffRefRoleSelect) return;
                var v = staffRefRoleSelect.value;
                staffRefRoleSelect.required = !v || v === '';
            }

            if (roleFromUrl === 'skf_admin') {
                staffRegMode = 'skf_admin';
                if (roleEl) roleEl.value = 'skf_admin';
                if (refereeRoleWrap) refereeRoleWrap.style.display = 'none';
            } else if (roleFromUrl === 'referee_staff' || roleFromUrl === 'referee' || roleFromUrl === 'referees_plus') {
                staffRegMode = 'referee_pick';
                if (roleEl) roleEl.value = '';
                if (refereeRoleWrap) refereeRoleWrap.style.display = 'block';
                if (staffRefRoleSelect) {
                    if (roleFromUrl === 'referee') {
                        staffRefRoleSelect.value = 'referee';
                        staffRefRoleSelect.required = false;
                    } else if (roleFromUrl === 'referees_plus') {
                        staffRefRoleSelect.value = 'referees_plus';
                        staffRefRoleSelect.required = false;
                    } else {
                        staffRefRoleSelect.value = '';
                        staffRefRoleSelect.selectedIndex = 0;
                        staffRefRoleSelect.required = true;
                    }
                    staffRefRoleSelect.addEventListener('change', syncStaffRefRoleRequired);
                }
            } else {
                if (roleEl) roleEl.value = '';
                window.location.replace('registration.html');
                return;
            }

            var form = document.getElementById('staffRegForm');
            var err = document.getElementById('regErr');
            var ok = document.getElementById('regOk');
            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                err.style.display = 'none';
                ok.style.display = 'none';
                var email = document.getElementById('a_email').value.trim().toLowerCase();
                var p1 = document.getElementById('a_pass').value;
                var p2 = document.getElementById('a_pass2').value;
                if (p1.length < 8) {
                    err.textContent = 'Password must be at least 8 characters.';
                    err.style.display = 'block';
                    return;
                }
                if (p1 !== p2) {
                    err.textContent = 'Passwords do not match.';
                    err.style.display = 'block';
                    return;
                }
                var role;
                if (staffRegMode === 'skf_admin') {
                    role = 'skf_admin';
                } else {
                    role = staffRefRoleSelect ? String(staffRefRoleSelect.value || '').trim() : '';
                    if (!role || (role !== 'referee' && role !== 'referees_plus')) {
                        err.textContent = 'Please select a role.';
                        err.style.display = 'block';
                        return;
                    }
                }
                if (role !== 'skf_admin' && role !== 'referees_plus' && role !== 'referee') {
                    err.textContent = 'Invalid request. Start again from the registration menu.';
                    err.style.display = 'block';
                    return;
                }
                if (roleEl) roleEl.value = role;
                var sb = typeof getSupabase === 'function' ? getSupabase() : null;
                if (!sb) {
                    err.textContent = 'Sign-in service unavailable. Refresh the page or try again later.';
                    err.style.display = 'block';
                    return;
                }
                var path = window.location.pathname || '';
                var dir = path.substring(0, path.lastIndexOf('/') + 1);
                var emailRedirectTo = window.location.origin + dir + 'auth-callback.html';
                var phone = document.getElementById('a_phone').value.trim();
                var fn = document.getElementById('a_fname').value.trim();
                var ln = document.getElementById('a_lname').value.trim();
                var fullName = (fn + ' ' + ln).trim();
                if (!fn || !ln) {
                    err.textContent = 'Please enter your first and last name.';
                    err.style.display = 'block';
                    return;
                }
                try {
                    var res = await sb.auth.signUp({
                        email: email,
                        password: p1,
                        options: {
                            emailRedirectTo: emailRedirectTo,
                            data: {
                                full_name: fullName,
                                role: role,
                                phone: phone || undefined,
                                club_name: 'SKF Federation',
                                skf_staff_application: 'true'
                            }
                        }
                    });
                    var createdUser = res.data && res.data.user && res.data.user.id;
                    if (res.error && !createdUser) {
                        ok.style.display = 'none';
                        ok.innerHTML = '';
                        err.textContent = res.error.message || 'Could not sign up. Please try again.';
                        err.style.display = 'block';
                        return;
                    }
                    if (res.error && createdUser) {
                        console.warn('signUp returned error but user was created:', res.error.message || res.error);
                    }
                    err.style.display = 'none';
                    err.textContent = '';
                    ok.innerHTML = '<strong>Email sent.</strong> Check your inbox (and spam) to confirm.';
                    ok.style.display = 'block';
                    form.reset();
                    if (staffRegMode === 'skf_admin') {
                        if (roleEl) roleEl.value = 'skf_admin';
                    } else if (staffRefRoleSelect) {
                        if (roleEl) roleEl.value = '';
                        if (roleFromUrl === 'referee_staff') {
                            staffRefRoleSelect.selectedIndex = 0;
                            staffRefRoleSelect.required = true;
                        } else if (roleFromUrl === 'referee') {
                            staffRefRoleSelect.value = 'referee';
                        } else if (roleFromUrl === 'referees_plus') {
                            staffRefRoleSelect.value = 'referees_plus';
                        }
                    }
                } catch (x) {
                    console.error(x);
                    err.textContent = 'Something went wrong. Please try again.';
                    err.style.display = 'block';
                }
            });
        })();
    </script>
</body>
</html>
